<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Claude Focus Videos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Noisy Grid Background */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .login-container {
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 12px;
      padding: 48px;
      max-width: 440px;
      width: 100%;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #ffffff;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #6b6b6b;
      margin-bottom: 32px;
      font-size: 14px;
      font-weight: 400;
    }

    .platform-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .platform-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 24px;
      border: 1px solid #262626;
      background: #0a0a0a;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: #ffffff;
    }

    .platform-btn:hover {
      background: #1a1a1a;
      border-color: #404040;
    }

    .platform-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .platform-btn i {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .btn-tiktok:hover { border-color: #ff0050; }
    .btn-instagram:hover { border-color: #E4405F; }
    .btn-youtube:hover { border-color: #FF0000; }

    .oauth-notice {
      background: #1a1208;
      border: 1px solid #332610;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #d4a574;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .oauth-notice i {
      color: #fbbf24;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      color: #4a4a4a;
      font-size: 13px;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #1a1a1a;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .simple-login {
      margin-top: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #a3a3a3;
      font-size: 13px;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a0a;
      border: 1px solid #262626;
      border-radius: 8px;
      font-size: 14px;
      color: #ffffff;
      transition: all 0.2s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #404040;
      background: #1a1a1a;
    }

    select option {
      background: #0a0a0a;
      color: #ffffff;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #ffffff;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .submit-btn:hover {
      background: #e5e5e5;
    }

    .error {
      background: #2a1a1a;
      border: 1px solid #4a2626;
      color: #ff6b6b;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Claude Focus Videos</h1>
    <p class="subtitle">Sign in to watch videos while Claude works</p>

    <div class="error" id="error"></div>

    <div class="oauth-notice">
      <i class="fas fa-info-circle"></i>
      <div>OAuth login requires API credentials. Use demo mode below to get started.</div>
    </div>

    <div class="platform-buttons">
      <a href="#" class="platform-btn btn-tiktok disabled">
        <i class="fab fa-tiktok"></i> Continue with TikTok
      </a>
      <a href="#" class="platform-btn btn-instagram disabled">
        <i class="fab fa-instagram"></i> Continue with Instagram
      </a>
      <a href="#" class="platform-btn btn-youtube disabled">
        <i class="fab fa-youtube"></i> Continue with YouTube
      </a>
    </div>

    <div class="divider">use demo mode</div>

    <div class="simple-login">
      <form id="loginForm">
        <div class="form-group">
          <label for="platform">Platform</label>
          <select id="platform" name="platform" required>
            <option value="">Select platform</option>
            <option value="tiktok">TikTok</option>
            <option value="instagram">Instagram</option>
            <option value="youtube">YouTube</option>
          </select>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        <button type="submit" class="submit-btn">Start Demo Mode</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const platform = document.getElementById('platform').value;
      const username = document.getElementById('username').value;
      const errorDiv = document.getElementById('error');

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ platform, username })
        });

        const data = await response.json();

        if (data.success) {
          window.location.href = '/';
        } else {
          errorDiv.textContent = data.error || 'Login failed';
          errorDiv.style.display = 'block';
        }
      } catch (error) {
        errorDiv.textContent = 'Connection error';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
