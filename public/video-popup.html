<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #videoContainer {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    .control-btn {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .platform-tag {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="videoContainer">
    <div class="platform-tag" id="platformTag">Demo Mode</div>
    <div class="loading" id="loading">Loading video...</div>
    <video id="videoPlayer" autoplay loop muted></video>
    <div class="controls">
      <button class="control-btn" onclick="toggleMute()">Unmute</button>
      <button class="control-btn" onclick="nextVideo()">Next</button>
    </div>
  </div>

  <script>
    const videoPlayer = document.getElementById('videoPlayer');
    const loading = document.getElementById('loading');
    const platformTag = document.getElementById('platformTag');
    let isMuted = true;

    // Demo video URLs (sample short videos)
    const demoVideos = [
      'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4',
      'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4',
      'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4'
    ];

    let currentVideoIndex = 0;

    function loadVideo() {
      loading.style.display = 'block';
      const videoUrl = demoVideos[currentVideoIndex];
      videoPlayer.src = videoUrl;
      videoPlayer.load();

      // Get platform from URL params
      const urlParams = new URLSearchParams(window.location.search);
      const platform = urlParams.get('platform') || 'demo';
      platformTag.textContent = platform.toUpperCase();
    }

    function toggleMute() {
      isMuted = !isMuted;
      videoPlayer.muted = isMuted;
      event.target.textContent = isMuted ? 'Unmute' : 'Mute';
    }

    function nextVideo() {
      currentVideoIndex = (currentVideoIndex + 1) % demoVideos.length;
      loadVideo();
    }

    videoPlayer.addEventListener('loadeddata', () => {
      loading.style.display = 'none';
    });

    videoPlayer.addEventListener('error', () => {
      loading.textContent = 'Failed to load video';
    });

    // Load first video
    loadVideo();

    // Poll server to check if we should close
    setInterval(async () => {
      try {
        const response = await fetch('/api/status');
        const data = await response.json();

        if (!data.claudeActive) {
          window.close();
        }
      } catch (error) {
        console.error('Status check failed:', error);
      }
    }, 2000);
  </script>
</body>
</html>
